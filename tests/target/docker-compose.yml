services:
  geistscope-vulnerable-target:
    image: python:3.12-slim
    working_dir: /app
    command: python server.py
    ports:
      - "18080:8080"
    volumes:
      - ./app:/app:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 2s
      timeout: 2s
      retries: 20
